# Render deployment — HR Admin Dashboard (view / edit / download, no camera).
# Lightweight: skips InsightFace/face-recognition, so it runs fine on the
# free/starter tier. Adding NEW employees still happens at the office kiosk.
# Live data: this connects to the same MongoDB Atlas cluster as the kiosk.
services:
  - type: web
    name: kodryx-hr-dashboard
    runtime: python
    plan: free                 # $0, no card needed. Sleeps after 15 min idle;
                                # first request after that takes ~30-50s to wake up.
    buildCommand: pip install -r requirements_cloud.txt
    startCommand: gunicorn dashboard.app:app --workers 1 --timeout 60 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI          # set in the Render dashboard (your Atlas URI)
        sync: false
      - key: ADMIN_USER         # HR's login username
        sync: false
      - key: ADMIN_PASSWORD     # HR's login password (choose something strong)
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
